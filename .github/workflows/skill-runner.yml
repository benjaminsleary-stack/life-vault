# Skill runner — on-demand path. Executes skills the dashboard queues as
# inbox/_runs/<skill>-<ts>.run trigger files (committed via the Worker).
#
# This is the LAPTOP-OFF fallback: when the desktop watcher
# (scripts/skill-runner-local.py) is running it claims triggers first and this
# stays idle. The `sleep + re-pull` below yields that window so the two never
# double-run. Scheduled runs live in scheduled-skills.yml, not here.
#
# Auth: CLAUDE_CODE_OAUTH_TOKEN (repo secret). Never deletes a trigger — archives
# it to inbox/_runs/_archive/ (golden rule 1).

name: skill-runner

on:
  push:
    paths:
      - "inbox/_runs/**.run"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: skill-runner        # shared with scheduled-skills.yml — never overlap
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main          # process the latest queue, not the trigger SHA
          fetch-depth: 0      # full history so rebase-before-push works

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Process queued runs
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: |
          set -uo pipefail
          # Yield to the desktop watcher, if any: wait briefly then re-pull so
          # triggers it already claimed disappear before we act.
          sleep 30
          git pull --rebase --autostash origin main || true

          shopt -s nullglob
          runs=(inbox/_runs/*.run)
          if [ ${#runs[@]} -eq 0 ]; then
            echo "No queued runs (already handled locally)."; exit 0
          fi
          mkdir -p inbox/_runs/_archive

          for f in "${runs[@]}"; do
            skill="$(basename "$f" .run | sed -E 's/-[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{6}$//')"
            echo "::group::skill $skill ($f)"
            input="$(node -e 'try{process.stdout.write(String(JSON.parse(require("fs").readFileSync(process.argv[1],"utf8")).input||""))}catch(e){}' "$f")"
            bash scripts/run-skill.sh "$skill" "$input" || true    # status file records ok/fail
            # Archive the trigger — kept forever, never deleted.
            git mv "$f" "inbox/_runs/_archive/$(basename "$f")" 2>/dev/null \
              || mv "$f" "inbox/_runs/_archive/$(basename "$f")"
            echo "::endgroup::"
          done

      - name: Commit results
        run: |
          git config user.name "life-vault skill-runner"
          git config user.email "actions@github.com"
          git add -A
          if git diff --cached --quiet; then echo "nothing to commit"; exit 0; fi
          git commit -m "skill-runner: results $(date -u +%FT%TZ)"
          # Survive a concurrent push (bridge / scheduled run / watcher).
          for a in 1 2 3 4 5; do
            git push && exit 0
            echo "push rejected — rebasing ($a)…"
            git pull --rebase --autostash origin main || git rebase --abort || true
            sleep $((a * 3))
          done
          echo "push failed after retries"; exit 1
