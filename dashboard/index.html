<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#1c1813" />
<link rel="manifest" href="manifest.webmanifest" />
<title>Life-Vault</title>
<style>
  /* The theme's intended faces, self-hosted (latin variable subsets). */
  @font-face{ font-family:"Hanken Grotesk"; src:url("fonts/hanken-grotesk-var.woff2") format("woff2");
    font-weight:400 700; font-style:normal; font-display:swap; }
  @font-face{ font-family:"Newsreader"; src:url("fonts/newsreader-var.woff2") format("woff2");
    font-weight:400 700; font-style:normal; font-display:swap; }

  /* Warm dark agentic-OS theme, from .superceeded/public/styles.css.
     Single committed warm-dark world. */
  :root{
    --bg1:#241f19; --bg2:#1c1813; --surface:#221d17; --surface-2:#2a2419;
    --line:#362e24; --line-row:#302921; --line-key:#3a3228;
    --text:#f2ece0; --text2:#ece5d8; --muted:#8c8272; --faint:#7d7365;
    --accent:#d98a63; --accent-text:#e6a884; --accent-ink:#1c1813;
    --blue:#8ca6b0; --purple:#b79bd0; --yellow:#d9a441; --green:#7d9877;
    --life:#cf98aa; --honey:#d4ab5e; --red:#c9736e;
    --a-family:var(--blue); --a-house:var(--green); --a-work:var(--honey);
    --a-health:var(--life); --a-interests:var(--purple); --a-admin:var(--yellow);
    --radius:12px;
    --ui:"Hanken Grotesk",system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --display:"Newsreader",Georgia,"Times New Roman",serif;
  }
  *{box-sizing:border-box;}
  body{ font-family:var(--ui); background:var(--bg2); color:var(--text);
    line-height:1.5; margin:0; padding:22px 16px 64px; -webkit-font-smoothing:antialiased;
    background-image:radial-gradient(680px 420px at 88% -6%, rgba(217,138,99,.10), transparent 60%);
    background-attachment:fixed; }
  .wrap{ max-width:760px; margin:0 auto; position:relative; z-index:1; }

  .top{ display:flex; align-items:center; justify-content:space-between; gap:16px; margin-bottom:3px; }
  .brand{ display:flex; align-items:center; gap:11px; }
  .mascot{ width:32px; height:32px; flex:none; border-radius:50%; background:#2a3327;
    display:grid; place-items:center; font-size:16px; box-shadow:0 0 0 1px var(--line); }
  .top h1{ font-family:var(--display); font-weight:500; font-size:25px; margin:0; letter-spacing:.01em; }
  .top h1 span{ color:var(--accent); }
  .status-pill{ display:inline-flex; align-items:center; gap:8px; padding:7px 13px; border-radius:999px;
    background:rgba(217,138,99,.14); border:1px solid rgba(217,138,99,.4); font-size:12.5px; font-weight:600; color:var(--accent-text); cursor:pointer; }
  .status-pill.off{ background:rgba(201,115,110,.14); border-color:rgba(201,115,110,.4); color:#e29b96; }
  .breathe-dot{ width:7px; height:7px; border-radius:50%; background:var(--accent); box-shadow:0 0 8px rgba(217,138,99,.7);
    animation:breathe 2.4s ease-in-out infinite; }
  .status-pill.off .breathe-dot{ background:var(--red); box-shadow:none; animation:none; }
  @keyframes breathe{ 0%,100%{opacity:.5; transform:scale(.85);} 50%{opacity:1; transform:scale(1);} }
  .sub{ color:var(--faint); font-size:13px; margin:6px 0 20px; font-variant-numeric:tabular-nums; }

  /* System strip: is the agent loop actually alive, and when did we last hear
     from it. Golden rule 5 — green ≠ done, so this states its evidence. */
  .sysbar{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin:8px 0 18px; }
  .sys-chip{ display:inline-flex; align-items:center; gap:7px; background:var(--surface); cursor:pointer;
    border:1px solid var(--line-key); border-radius:999px; padding:5px 12px; font:inherit; font-size:12.5px;
    font-weight:600; color:var(--muted); }
  .sys-chip:hover{ border-color:var(--accent); color:var(--text); }
  .sys-chip .dot{ width:7px; height:7px; border-radius:50%; background:var(--green); flex:none; }
  .sys-chip.warn{ color:#e0b969; border-color:color-mix(in srgb,var(--yellow) 45%,var(--line-key)); }
  .sys-chip.warn .dot{ background:var(--yellow); }
  .sys-chip.bad{ color:#e29b96; border-color:color-mix(in srgb,var(--red) 45%,var(--line-key)); }
  .sys-chip.bad .dot{ background:var(--red); }
  .sys-updated{ color:var(--faint); font-size:12.5px; font-variant-numeric:tabular-nums; }
  .sys-refresh{ background:none; border:none; color:var(--faint); font:inherit; font-size:14px; cursor:pointer;
    padding:2px 6px; border-radius:6px; }
  .sys-refresh:hover{ color:var(--accent-text); }
  .sys-refresh.spin{ animation:spin .7s linear infinite; }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  /* Health detail rows inside the system sheet. */
  .hrow{ display:flex; align-items:baseline; gap:10px; padding:9px 0; border-bottom:1px solid var(--line-row); font-size:14px; }
  .hrow:last-child{ border-bottom:0; }
  .hrow .hname{ flex:1; }
  .hrow .hwhy{ font-size:12.5px; color:var(--muted); font-variant-numeric:tabular-nums; }

  .card{ background:var(--surface); border:1px solid var(--line); border-radius:var(--radius);
    padding:15px 16px; margin-bottom:14px; }
  .section-head{ display:flex; align-items:baseline; justify-content:space-between; gap:10px; margin:0 0 12px; }
  .label{ font-size:11px; letter-spacing:.2em; text-transform:uppercase; color:var(--faint); margin:0; font-weight:600; }
  .count{ font-size:12px; color:var(--faint); font-variant-numeric:tabular-nums; }
  .link{ background:none; border:none; color:var(--accent); font:inherit; font-size:13px; cursor:pointer; padding:2px 4px; }
  .link:hover{ text-decoration:underline; }
  .muted{ color:var(--muted); font-size:14px; }

  textarea,input[type=text],input[type=date],input[type=password],select{ width:100%; background:var(--bg1); color:var(--text);
    border:1px solid var(--line-key); border-radius:10px; padding:11px 12px; font:inherit; font-size:15px; }
  textarea{ min-height:64px; resize:vertical; }
  textarea::placeholder,input::placeholder{ color:var(--muted); }
  textarea:focus,input:focus,select:focus{ outline:2px solid var(--accent); outline-offset:-1px; border-color:var(--accent); }
  .row{ display:flex; gap:8px; margin-top:9px; flex-wrap:wrap; }
  .row>*{ flex:1; min-width:130px; }
  .btn{ background:var(--surface-2); color:var(--text); border:1px solid var(--line-key); border-radius:10px;
    padding:11px 15px; font:inherit; font-size:14px; font-weight:600; cursor:pointer; }
  .btn:hover{ border-color:var(--accent); }
  .btn.primary{ background:var(--accent); border-color:var(--accent); color:var(--accent-ink); }
  .btn.primary:hover{ filter:brightness(1.06); }
  .btn.mic{ flex:0 0 auto; min-width:0; }
  .btn.mic.rec{ background:rgba(201,115,110,.16); border-color:var(--red); color:#e8a29d; animation:breathe 1.6s ease-in-out infinite; }

  .priority{ display:flex; align-items:center; gap:11px; background:var(--bg1);
    border:1px solid var(--line-row); border-left:3px solid var(--accent); border-radius:10px;
    padding:10px 12px; margin-bottom:7px; }
  .priority:last-child{ margin-bottom:0; }
  .priority .rank{ flex:0 0 auto; width:23px; height:23px; display:grid; place-items:center; border-radius:50%;
    background:var(--accent); color:var(--accent-ink); font-size:12px; font-weight:700; font-variant-numeric:tabular-nums; }
  .priority .p-title{ font-size:15px; }
  .priority .p-meta{ font-size:12px; color:var(--muted); margin-top:1px; }
  .priority.over{ border-left-color:var(--red); }
  .priority.over .rank{ background:var(--red); color:#1c1813; }

  .skill{ display:flex; align-items:center; gap:12px; padding:10px 0; border-bottom:1px solid var(--line-row); }
  .skill:last-child{ border-bottom:0; }
  .skill .s-body{ flex:1; min-width:0; }
  .skill .s-name{ font-size:14.5px; font-weight:600; }
  .skill .s-desc{ font-size:12px; color:var(--muted); margin-top:1px; }
  .skill .s-status{ font-size:12px; color:var(--faint); font-variant-numeric:tabular-nums; white-space:nowrap; display:flex; align-items:center; gap:5px; }
  .tick{ color:var(--green); font-weight:700; }
  .cross{ color:var(--red); font-weight:700; }
  .s-actions{ flex:0 0 auto; display:flex; gap:6px; }
  .run-btn{ background:var(--surface-2); color:var(--accent-text); border:1px solid var(--line-key);
    border-radius:8px; padding:7px 13px; font:inherit; font-size:13px; font-weight:600; cursor:pointer; }
  .run-btn:hover{ border-color:var(--accent); background:rgba(217,138,99,.12); }
  .run-btn.busy{ color:var(--faint); border-color:var(--line); cursor:default; }
  .open-btn{ background:none; color:var(--muted); border:1px solid var(--line-key); border-radius:8px;
    padding:7px 12px; font:inherit; font-size:13px; font-weight:600; cursor:pointer; }
  .open-btn:hover{ border-color:var(--accent); color:var(--text); }
  .open-btn.disabled{ opacity:.4; cursor:default; border-color:var(--line); }
  .open-btn.disabled:hover{ color:var(--muted); }
  .running{ display:inline-block; width:8px; height:8px; border-radius:50%; background:var(--yellow); animation:breathe 1.2s ease-in-out infinite; }
  @media (prefers-reduced-motion: reduce){ .running,.breathe-dot{ animation:none; } body{ background-image:none; } }

  .domain{ margin-bottom:14px; }
  .domain:last-child{ margin-bottom:0; }
  .domain h3{ font-size:11px; margin:0 0 6px; text-transform:uppercase; letter-spacing:.14em; font-weight:700;
    display:flex; align-items:center; gap:8px; color:var(--hue,var(--accent)); }
  .domain h3::before{ content:""; width:8px; height:8px; border-radius:2px; background:var(--hue,var(--accent)); }
  .domain h3 .n{ color:var(--faint); letter-spacing:0; font-weight:600; }
  .domain.family{ --hue:var(--a-family); } .domain.house{ --hue:var(--a-house); }
  .domain.work{ --hue:var(--a-work); } .domain.health{ --hue:var(--a-health); }
  .domain.interests{ --hue:var(--a-interests); } .domain.admin{ --hue:var(--a-admin); }
  .task{ display:flex; align-items:flex-start; gap:11px; padding:8px 0; border-bottom:1px solid var(--line-row); }
  .task:last-child{ border-bottom:0; }
  .check{ width:22px; height:22px; flex:0 0 auto; border-radius:6px; border:1.5px solid var(--line-key);
    background:var(--bg1); color:transparent; display:grid; place-items:center; cursor:pointer;
    font-size:14px; margin-top:1px; transition:.12s; }
  .check:hover{ border-color:var(--green); }
  .check.on{ background:var(--green); border-color:var(--green); color:#14200f; }
  .t-body{ flex:1; min-width:0; }
  .t-title{ font-size:15px; }
  .task.done .t-title{ color:var(--muted); text-decoration:line-through; }
  .pill{ display:inline-block; font-size:11px; padding:1px 8px; border-radius:20px; border:1px solid var(--line-key);
    color:var(--muted); margin-left:7px; vertical-align:1px; font-variant-numeric:tabular-nums; }
  .pill.over{ color:var(--red); border-color:color-mix(in srgb,var(--red) 55%,var(--line-key)); }
  .pill.due{ color:var(--yellow); border-color:color-mix(in srgb,var(--yellow) 55%,var(--line-key)); }

  .md h3{ font-family:var(--display); font-weight:600; font-size:16px; color:var(--accent-text); margin:14px 0 6px; }
  .md h3:first-child{ margin-top:0; }
  .md ul{ margin:0 0 8px; padding-left:18px; }
  .md li{ margin:3px 0; font-size:14px; }
  .md strong{ color:var(--text); }
  .md hr{ border:none; border-top:1px solid var(--line); margin:12px 0; }
  .md p{ font-size:14px; margin:6px 0; }
  .md em{ color:var(--text2); }
  .md code{ font-size:12.5px; background:var(--bg1); border:1px solid var(--line-row); border-radius:5px; padding:1px 5px; }
  .md a{ color:var(--accent-text); }
  .md blockquote{ margin:8px 0; padding-left:11px; border-left:2px solid var(--line-key); color:var(--muted); font-size:14px; }
  .md li.md-task{ list-style:none; margin-left:-18px; display:flex; gap:8px; align-items:flex-start; }
  .md .md-box{ flex:none; width:15px; height:15px; margin-top:3px; border-radius:4px; border:1.5px solid var(--line-key);
    background:var(--bg1); display:grid; place-items:center; font-size:10px; color:transparent; }
  .md li.md-task.done .md-box{ background:var(--green); border-color:var(--green); color:#14200f; }
  .md li.md-task.done{ color:var(--muted); }

  .ent{ display:flex; gap:11px; padding:9px 0; border-bottom:1px solid var(--line-row); }
  .ent:last-child{ border-bottom:0; }
  .ent .av{ flex:0 0 auto; width:30px; height:30px; border-radius:50%; background:var(--surface-2);
    border:1px solid var(--line-key); display:grid; place-items:center; font-size:13px; font-weight:700; color:var(--accent-text); }
  .ent .e-name{ font-weight:600; font-size:14.5px; }
  .ent .e-sum{ font-size:12.5px; color:var(--muted); margin-top:1px; }
  .occ{ display:flex; align-items:baseline; gap:10px; padding:7px 0; border-bottom:1px solid var(--line-row); font-size:14px; }
  .occ:last-child{ border-bottom:0; }
  .occ .d{ color:var(--accent-text); font-variant-numeric:tabular-nums; font-size:12.5px; min-width:52px; }
  .occ .in{ color:var(--faint); font-size:12px; margin-left:auto; }

  /* Habits */
  .habit{ background:var(--bg1); border:1px solid var(--line-row); border-radius:10px; padding:10px 12px; margin-bottom:8px; }
  .habit:last-child{ margin-bottom:0; }
  .habit.complete{ border-color:color-mix(in srgb, var(--green) 55%, var(--line-row)); }
  .habit-head{ display:flex; align-items:baseline; gap:8px; }
  .habit-name{ flex:1; font-weight:600; font-size:14.5px; }
  .habit-count{ font-size:12px; color:var(--muted); font-variant-numeric:tabular-nums; }
  .habit-streak{ font-size:12px; color:var(--honey); font-variant-numeric:tabular-nums; }
  .habit-items{ margin-top:7px; display:flex; flex-direction:column; gap:4px; }
  .habit-item{ display:flex; align-items:center; gap:9px; font-size:14px; cursor:pointer; color:var(--text2); }
  .habit-item .hchk{ width:18px; height:18px; flex:none; border-radius:5px; border:1.5px solid var(--line-key);
    background:var(--surface); display:grid; place-items:center; font-size:11px; color:transparent; transition:.12s; }
  .habit-item.on .hchk{ background:var(--green); border-color:var(--green); color:#14200f; }
  .habit-item.on{ color:var(--muted); }

  .grid2{ display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  @media (max-width:560px){ .grid2{ grid-template-columns:1fr; } }
  .grid2 .card{ margin-bottom:0; }

  /* Weather */
  .wx-top{ display:flex; align-items:center; justify-content:space-between; gap:12px; }
  .wx-now{ display:flex; align-items:center; gap:12px; }
  .wx-emoji{ font-size:30px; line-height:1; }
  .wx-temp{ font-size:34px; font-weight:600; font-variant-numeric:tabular-nums; line-height:1; }
  .wx-cond{ font-size:13px; color:var(--muted); margin-top:2px; }
  .wx-hl{ font-size:13px; color:var(--muted); font-variant-numeric:tabular-nums; text-align:right; white-space:nowrap; }
  .wx-hl b{ color:var(--text); font-weight:600; }
  .wx-chart{ width:100%; margin-top:12px; position:relative; touch-action:none; }
  .wx-chart svg{ width:100%; height:auto; display:block; overflow:visible; }
  .wx-tip{ position:absolute; top:-4px; background:var(--surface-2); border:1px solid var(--line-key);
    color:var(--text); font-size:11px; padding:3px 8px; border-radius:6px; pointer-events:none; opacity:0;
    transition:opacity .12s; white-space:nowrap; font-variant-numeric:tabular-nums; z-index:2; }
  .wx-aq{ margin-top:8px; font-size:12.5px; color:var(--muted); font-variant-numeric:tabular-nums; }
  .wx-axis{ fill:var(--faint); font-size:8px; font-family:var(--ui); }

  /* Desktop: deliberate bento arrangement — tasks is the tall hero on the
     left, capture/ask stack beside it, weather and brief on the right rail.
     Mobile keeps the natural single-column source order. */
  @media (min-width:900px){
    .wrap{ max-width:1180px; }
    .cards{
      display:grid; gap:14px; align-items:start;
      grid-template-columns:1.15fr 1fr 1fr;
      grid-template-areas:
        "tasks  capture weather"
        "tasks  ask     weather"
        "tasks  skills  brief"
        "add    skills  brief"
        "habits people  agenda";
    }
    .cards .card{ margin-bottom:0; }
    .c-tasks{ grid-area:tasks; } .c-capture{ grid-area:capture; }
    .c-weather{ grid-area:weather; } .c-ask{ grid-area:ask; }
    .c-skills{ grid-area:skills; } .c-brief{ grid-area:brief; }
    .c-add{ grid-area:add; } .c-people{ grid-area:people; } .c-agenda{ grid-area:agenda; }
    .c-habits{ grid-area:habits; }
    .cards > .grid2{ display:contents; }
  }

  /* Tasks: drag handle, priority star, category headers */
  .task .drag{ flex:0 0 auto; cursor:grab; color:var(--faint); font-size:15px; margin-top:1px;
    touch-action:none; user-select:none; padding:0 3px 0 0; }
  .task.dragging{ opacity:.6; background:var(--bg1); border-radius:8px; }
  .pstar{ flex:0 0 auto; background:none; border:none; color:var(--line-key); font-size:14px; cursor:pointer; padding:2px; line-height:1; }
  .pstar.on{ color:var(--accent); }
  .pstar:hover{ color:var(--accent-text); }
  .task.pri .t-title{ color:var(--text); }
  .tcat{ font-size:11px; margin:13px 0 4px; text-transform:uppercase; letter-spacing:.14em; font-weight:700;
    color:var(--hue,var(--accent)); display:flex; align-items:center; gap:8px; }
  .tcat::before{ content:""; width:8px; height:8px; border-radius:2px; background:var(--hue,var(--accent)); }
  .tcat:first-child{ margin-top:0; }
  .tcat.family{ --hue:var(--a-family);} .tcat.house{ --hue:var(--a-house);} .tcat.work{ --hue:var(--a-work);}
  .tcat.health{ --hue:var(--a-health);} .tcat.interests{ --hue:var(--a-interests);} .tcat.admin{ --hue:var(--a-admin);}

  .toast{ position:fixed; left:50%; bottom:22px; transform:translateX(-50%) translateY(8px); background:var(--green);
    color:#14200f; padding:9px 18px; border-radius:20px; font-weight:700; font-size:14px; opacity:0;
    transition:.2s; pointer-events:none; z-index:50; }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
  .toast.err{ background:var(--red); color:#2a0f0d; }
  .foot{ color:var(--faint); font-size:12px; text-align:center; margin-top:6px; }

  /* Skeleton shimmer while a JS-filled container is still empty. */
  .skel:empty{ display:block; min-height:56px; border-radius:8px;
    background:linear-gradient(100deg, var(--surface-2) 35%, var(--line-row) 50%, var(--surface-2) 65%);
    background-size:200% 100%; animation:shimmer 1.3s linear infinite; }
  @keyframes shimmer{ to{ background-position:-200% 0; } }

  /* Task completion: strike settles in before the list re-renders. */
  .task .t-title{ transition:color .25s ease; }
  .task.done-anim .t-title{ color:var(--muted); text-decoration:line-through; }
  .task.done-anim{ opacity:.55; transition:opacity .25s ease; }

  /* Glass on the status pill. */
  .status-pill{ backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px); }
  .alerts-btn{ background:var(--surface); color:var(--muted); border:1px solid var(--line-key);
    border-radius:999px; padding:7px 13px; font:inherit; font-size:12.5px; font-weight:600; cursor:pointer; }
  .alerts-btn:hover{ border-color:var(--accent); color:var(--text); }

  /* Section-jump pills (mobile only — desktop sees everything at once). */
  html{ scroll-behavior:smooth; }
  .jump{ position:sticky; top:0; z-index:40; display:flex; gap:8px; padding:8px 0 10px;
    margin:0 -16px 8px; padding-left:16px; padding-right:16px;
    background:color-mix(in srgb, var(--bg2) 82%, transparent);
    backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px); }
  .jump a{ text-decoration:none; color:var(--muted); font-size:12.5px; font-weight:600;
    border:1px solid var(--line-key); border-radius:999px; padding:6px 13px; }
  .jump a:active, .jump a:hover{ color:var(--text); border-color:var(--accent); }
  @media (min-width:900px){ .jump{ display:none; } }


  /* Output links under a skill */
  .s-out{ font-size:12px; margin-top:4px; display:flex; flex-wrap:wrap; gap:4px 10px; }
  .s-out a{ color:var(--accent-text); cursor:pointer; text-decoration:none; }
  .s-out a:hover{ text-decoration:underline; }

  /* File viewer modal (fades in; the sheet slides). */
  .modal-back{ position:fixed; inset:0; background:rgba(7,6,4,.6); backdrop-filter:blur(6px);
    -webkit-backdrop-filter:blur(6px); display:flex; align-items:flex-start; justify-content:center;
    padding:5vh 16px; z-index:80; overflow-y:auto;
    visibility:hidden; opacity:0; transition:opacity .22s ease, visibility .22s; }
  .modal-back.show{ visibility:visible; opacity:1; }
  .modal{ transform:translateY(14px); transition:transform .22s ease; }
  .modal-back.show .modal{ transform:none; }
  .modal{ background:var(--surface); border:1px solid var(--line); border-radius:16px; max-width:680px; width:100%;
    box-shadow:0 30px 80px rgba(0,0,0,.5); }
  .modal-head{ display:flex; align-items:center; justify-content:space-between; gap:12px; padding:13px 16px;
    border-bottom:1px solid var(--line); position:sticky; top:0; background:var(--surface); border-radius:16px 16px 0 0; }
  .modal-head .m-name{ font-family:var(--display); font-size:15px; color:var(--accent-text); word-break:break-all; }
  .modal-close{ flex:0 0 auto; background:var(--surface-2); border:1px solid var(--line-key); color:var(--text);
    border-radius:8px; width:30px; height:30px; font-size:16px; cursor:pointer; }
  .modal-close:hover{ border-color:var(--accent); }
  .modal-body{ padding:14px 18px 16px; }
  .modal-reply{ border-top:1px solid var(--line); padding:12px 16px 16px; display:flex; flex-direction:column; gap:8px; }
  .modal-reply textarea{ min-height:52px; }
  .save-advice{ margin-left:8px; background:var(--surface-2); border:1px solid var(--line-key); color:var(--accent-text);
    border-radius:6px; font:inherit; font-size:12px; padding:2px 9px; cursor:pointer; vertical-align:1px; }
  .save-advice:hover{ border-color:var(--accent); }
  .save-advice:disabled{ opacity:.6; cursor:default; }

  /* Unlock gate */
  .gate{ position:fixed; inset:0; background:linear-gradient(180deg,var(--bg1),var(--bg2)); display:grid; place-items:center; padding:20px; z-index:100; }
  .gate-card{ background:var(--surface); border:1px solid var(--line); border-radius:16px; padding:22px; max-width:380px; width:100%; }
  .gate-card h1{ font-family:var(--display); font-weight:500; font-size:24px; margin:0 0 4px; }
  .gate-card h1 span{ color:var(--accent); }
  .gate-card p{ color:var(--muted); font-size:13.5px; margin:0 0 16px; }
  .gate-card label{ display:block; font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--faint); margin:12px 0 5px; font-weight:600; }
  .hidden{ display:none !important; }

  /* Mobile: the file viewer becomes a full-height bottom sheet.
     (Kept at the end of the sheet so it wins the equal-specificity cascade
     against the base .modal rules above.) */
  @media (max-width:560px){
    .modal-back{ align-items:flex-end; padding:0; }
    .modal{ width:100%; max-width:none; border-radius:18px 18px 0 0; max-height:92dvh;
      overflow-y:auto; transform:translateY(100%); }
    .modal-back.show .modal{ transform:none; }
    .modal-head{ position:sticky; border-radius:18px 18px 0 0; padding-top:14px; }
    .modal-head::before{ content:""; position:absolute; left:50%; top:6px; width:40px; height:4px;
      border-radius:2px; background:var(--line-key); transform:translateX(-50%); }
  }

  @media (prefers-reduced-motion: reduce){
    html{ scroll-behavior:auto; }
    .skel:empty{ animation:none; }
    .modal-back,.modal,.task,.task .t-title{ transition:none; }
  }
</style>
</head>
<body>
  <!-- Unlock gate: no vault data is fetched until a Worker URL + unlock token exist -->
  <div class="gate" id="gate">
    <div class="gate-card">
      <h1>Life<span>·</span>Vault</h1>
      <p>Enter your unlock token. It's stored on this device only and sent with each request.</p>
      <label for="gTok">Unlock token</label>
      <input type="password" id="gTok" placeholder="your unlock token" autocomplete="off" />
      <div class="row"><button class="btn primary" onclick="saveGate()">Connect</button></div>
      <p id="gErr" class="hidden" style="color:var(--red); margin-top:12px;"></p>
    </div>
  </div>

  <div class="wrap hidden" id="app">
    <div class="top">
      <div class="brand">
        <div class="mascot">🐢</div>
        <h1>Life<span>·</span>Vault</h1>
      </div>
      <div style="display:flex; gap:8px; align-items:center;">
        <button class="alerts-btn hidden" id="alertsBtn" onclick="enableAlerts()" title="Get a push when a brief or answer is ready">🔔 Alerts</button>
        <span class="status-pill" id="statusPill" onclick="openHealth()" title="Connection and routine health"><span class="breathe-dot"></span><span id="statusText">connecting…</span></span>
      </div>
    </div>
    <div class="sysbar">
      <button class="sys-chip" id="sysHealth" onclick="openHealth()" title="Are the routines actually running?">
        <span class="dot"></span><span id="sysHealthText">checking…</span>
      </button>
      <span class="sys-updated" id="gen">—</span>
      <button class="sys-refresh" id="refreshBtn" onclick="load(true)" title="Refresh now" aria-label="Refresh">↻</button>
    </div>

    <nav class="jump">
      <a href="#sec-today">Today</a>
      <a href="#sec-skills">Skills</a>
      <a href="#sec-people">People</a>
    </nav>

    <div class="cards">
    <div class="card c-capture">
      <div class="section-head"><p class="label">Capture</p><span class="count" id="inboxChip">→ inbox/</span></div>
      <textarea id="cap" placeholder="Dump a thought, note, or 'done: …'. Saved raw for the filing skill to sort."></textarea>
      <div class="row">
        <button class="btn mic hidden" id="micBtn" onclick="toggleMic()" title="Dictate">🎙 Rec</button>
        <button class="btn primary" onclick="doCapture()">Capture to inbox</button>
      </div>
    </div>

    <div class="card c-ask">
      <div class="section-head"><p class="label">Ask</p><span class="count">your vault</span></div>
      <input type="text" id="askq" placeholder="e.g. what's open for the house?" onkeydown="if(event.key==='Enter')askVault()" />
      <div class="row"><button class="btn primary" onclick="askVault()">Ask</button></div>
    </div>

    <div class="card c-tasks" id="sec-today">
      <div class="section-head"><p class="label">Tasks</p><span class="count" id="taskCount"></span></div>
      <div id="tasksTop" class="skel"></div>
      <div id="tasksAll" class="hidden"></div>
      <button class="link" id="showAllBtn" onclick="toggleShowAll()" style="margin-top:8px">Show all</button>
    </div>

    <div class="card c-skills" id="sec-skills">
      <div class="section-head"><p class="label">Routines</p><span class="count" id="skillsCount"></span></div>
      <div id="skills" class="skel"></div>
    </div>

    <div class="card c-add">
      <div class="section-head"><p class="label">Add task</p><span class="count">→ tasks.md</span></div>
      <input type="text" id="ttext" placeholder="What needs doing" />
      <div class="row">
        <input type="date" id="tdue" />
        <select id="ttag">
          <option value="">#area…</option>
          <option>family</option><option>house</option><option>work</option>
          <option>health</option><option>interests</option><option>admin</option>
        </select>
      </div>
      <div class="row"><button class="btn primary" onclick="doAddTask()">Add to task list</button></div>
    </div>

    <div class="card c-brief">
      <div class="section-head"><p class="label">Latest brief</p><span class="count" id="briefName">—</span></div>
      <div class="md" id="brief"><div class="muted">—</div></div>
    </div>

    <div class="card c-weather">
      <div class="section-head"><p class="label">Weather</p><span class="count" id="wxPlace">Cambridge</span></div>
      <div id="weatherBody" class="skel"></div>
    </div>

    <div class="card c-habits">
      <div class="section-head"><p class="label">Habits</p><span class="count" id="habitPct"></span></div>
      <div id="habits" class="skel"></div>
    </div>

    <div class="grid2" id="sec-people">
      <div class="card c-people">
        <div class="section-head"><p class="label">People</p><span class="count" id="pplCount"></span></div>
        <div id="ppl" class="skel"></div>
      </div>
      <div class="card c-agenda">
        <div class="section-head"><p class="label">Agenda</p><span class="count">next 7 days</span></div>
        <div id="agenda" class="skel"></div>
      </div>
    </div>
    </div><!-- /.cards -->

  </div>

  <div class="toast" id="toast"></div>

  <!-- File viewer modal: opens skill outputs (.md) rendered for reading -->
  <div class="modal-back" id="modalBack" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <div class="modal-head">
        <span class="m-name" id="modalName">—</span>
        <button class="modal-close" onclick="closeModal()" aria-label="Close">✕</button>
      </div>
      <div class="modal-body md" id="modalBody"></div>
      <div class="modal-reply" id="modalReply">
        <textarea id="replyText" placeholder="Reply — captured to your inbox and actioned now…"></textarea>
        <button class="btn primary" onclick="sendReply()">Send &amp; action</button>
      </div>
    </div>
  </div>

<script>
  // --- config, stored on-device only ---------------------------------------
  const AREAS = ["family","house","work","health","interests","admin"];
  // Skills surfaced with a Run button + last-run status (merged with /api/data).
  const SKILLS = [
    { name:"file-inbox",        label:"File",     desc:"Sort captures into people / tasks / notes" },
    { name:"morning-brief",     label:"Morning",  desc:"Today's due items, occasions, news, one nudge" },
    { name:"evening-brief",     label:"Evening",  desc:"Debrief, Charlotte, data-capture request" },
    { name:"weave",             label:"Weave",    desc:"Refresh MOCs & the index" },
    { name:"refresh-summaries", label:"Refresh",  desc:"Rewrite people / project summaries" },
    { name:"interest-scout",    label:"Discover", desc:"Weekly discover feed for your interests" },
    { name:"ask",               label:"Ask",      desc:"Answers from the vault (use the Ask box)", noRun:true },
  ];
  // Served from localhost = the dev server (dev/server.mjs), which mounts the
  // same API on the same origin and needs no unlock token.
  const DEV = ["localhost", "127.0.0.1"].includes(location.hostname);
  // The Worker URL is fixed, so default it — you only ever enter the token.
  const DEFAULT_API = "https://life-vault.benvault.workers.dev";
  let API = DEV ? "" : (localStorage.getItem("lv_api") || DEFAULT_API);
  let TOKEN = localStorage.getItem("lv_token") || "";
  let lastData = null;
  // skill -> the .when seen when queued, to detect a fresh completion and
  // auto-open its output. Persisted so a reload between queue and finish
  // doesn't lose the pending auto-open.
  let awaiting = {};
  try { awaiting = JSON.parse(localStorage.getItem("lv_awaiting") || "{}"); } catch {}
  function saveAwaiting(){ localStorage.setItem("lv_awaiting", JSON.stringify(awaiting)); }

  const $ = (id) => document.getElementById(id);
  function esc(s){ return (s||"").replace(/[&<>"']/g, (c)=>({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c])); }
  // Vault dates are Europe/London days — toISOString() is UTC and rolls a day
  // early between 23:00 and midnight in summer.
  function localToday(){ return new Intl.DateTimeFormat("en-CA",{timeZone:"Europe/London"}).format(new Date()); }
  function toast(m, err){ const t=$("toast"); t.textContent=m; t.classList.toggle("err",!!err); t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),1600); }

  // --- gate -----------------------------------------------------------------
  function showGate(msg){
    $("gate").classList.remove("hidden"); $("app").classList.add("hidden");
    if(msg){ $("gErr").textContent=msg; $("gErr").classList.remove("hidden"); }
  }
  function saveGate(){
    const tok=$("gTok").value.trim();
    if(!tok){ $("gErr").textContent="Enter your unlock token."; $("gErr").classList.remove("hidden"); return; }
    TOKEN=tok; localStorage.setItem("lv_token",TOKEN); localStorage.setItem("lv_api",API);
    $("gate").classList.add("hidden"); $("app").classList.remove("hidden"); load(); loadWeather(); refreshAlertsBtn();
  }
  function signOut(){ if(!confirm("Disconnect this device? The token is cleared from here.")) return;
    localStorage.removeItem("lv_token"); TOKEN=""; showGate(); }

  // --- api ------------------------------------------------------------------
  function req(path, opts={}){
    return fetch(API+path, { ...opts, headers:{ "Authorization":"Bearer "+TOKEN, "Content-Type":"application/json", ...(opts.headers||{}) } });
  }
  async function load(manual){
    const btn=$("refreshBtn");
    if(manual) btn.classList.add("spin");
    try{
      const r = await req("/api/data?t="+Date.now());   // cache-bust
      if(r.status===401){ showGate("Token rejected. Check the unlock token."); return; }
      if(!r.ok) throw new Error("HTTP "+r.status);
      render(await r.json());
      setStatus(true);
      if(manual) toast("Up to date");
    }catch(e){ setStatus(false); if(manual) toast("Couldn't reach the vault",true); }
    finally{ if(manual) setTimeout(()=>btn.classList.remove("spin"),400); }
    loadHealth();
  }

  // --- is the agent loop alive? --------------------------------------------
  // The most useful thing this app can tell you is that it has stopped working.
  // A brief that silently hasn't run for three days looks identical to one that
  // ran fine, unless something checks. This is that check (golden rule 5).
  let lastHealth=null;
  async function loadHealth(){
    try{
      const r=await req("/api/health"); if(!r.ok) throw new Error();
      renderHealth(lastHealth=await r.json());
    }catch(e){
      $("sysHealthText").textContent="health unknown";
      $("sysHealth").className="sys-chip warn";
    }
  }
  function renderHealth(h){
    $("sysHealthText").textContent=h.summary;
    $("sysHealth").className="sys-chip"+(h.stuck.length?" bad":(h.ok?"":" warn"));
  }
  function openHealth(){
    const h=lastHealth;
    if(!h){ openPanel("System", '<div class="muted">Health unavailable.</div>'); return; }
    let html="<h3>Routines</h3>";
    html+=h.checks.map((c)=>
      '<div class="hrow"><span class="'+(c.ok?"tick":"cross")+'">'+(c.ok?"✓":"✗")+'</span>'+
      '<span class="hname">'+esc(c.name)+'</span>'+
      '<span class="hwhy">'+esc(c.why || (c.when?fmtWhen(c.when):""))+'</span></div>').join("");
    if(h.stuck.length){
      html+="<h3>Waiting for a runner</h3>"+h.stuck.map((s)=>
        '<div class="hrow"><span class="cross">✗</span><span class="hname">'+esc(s.name)+
        '</span><span class="hwhy">queued '+s.mins+'m ago</span></div>').join("")+
        '<p class="muted">Nothing has picked these up. Start the desktop watcher, or check the '+
        'skill-runner workflow on GitHub.</p>';
    }
    html+='<hr><p><button class="btn" onclick="signOut()">Disconnect this device</button></p>';
    openPanel("System", html);
  }
  function post(path, body, msg){
    return req(path,{ method:"POST", body:JSON.stringify(body) })
      .then((r)=>{ if(!r.ok) throw new Error(); return r.json(); })
      .then(()=>{ toast(msg); load(); })
      .catch(()=>toast("Failed",true));
  }
  function setStatus(ok){
    $("statusPill").classList.toggle("off",!ok);
    $("statusText").textContent = ok ? "live on the vault" : "disconnected";
  }

  // --- actions --------------------------------------------------------------
  function doCapture(){ const e=$("cap"); if(!e.value.trim())return; post("/api/capture",{text:e.value},"Captured to inbox").then(()=>e.value=""); }
  function doAddTask(){
    const t=$("ttext"); if(!t.value.trim())return;
    const text=t.value.trim(), due=$("tdue").value, tag=$("ttag").value;
    // Optimistic: show it now; persist in the background; the next poll reconciles.
    if(lastData){
      const todayStr=localToday();
      (lastData.tasks=lastData.tasks||[]).push({ id:"tmp"+Date.now(), text, done:false,
        due:due||null, tags:tag?[tag]:[], overdue: !!(due && due<=todayStr) });
      render(lastData);
    }
    t.value=""; $("tdue").value=""; $("ttag").value="";
    req("/api/task",{method:"POST",body:JSON.stringify({text,due,tag})})
      .then((r)=>{ if(!r.ok) throw new Error(); toast("Task added"); })
      .catch(()=>{ toast("Failed",true); load(); });
  }
  function toggle(id){
    // Optimistic: flip locally now so a stale read can't bounce it back. When
    // completing, let the strike animation settle before the list re-renders.
    const doFlip=()=>{
      if(lastData){
        const t=(lastData.tasks||[]).find((x)=>String(x.id)===String(id));
        if(t){ t.done=!t.done; if(t.done) t.overdue=false; render(lastData); }
      }
    };
    const row=document.querySelector('.task[data-id="'+id+'"]');
    const completing=row && !row.classList.contains("done");
    if(completing && !matchMedia("(prefers-reduced-motion: reduce)").matches){
      row.classList.add("done-anim");
      const chk=row.querySelector(".check"); if(chk){ chk.classList.add("on"); chk.textContent="✓"; }
      setTimeout(doFlip, 280);
    } else doFlip();
    req("/api/toggle",{method:"POST",body:JSON.stringify({id})})
      .then((r)=>{ if(!r.ok) throw new Error(); toast("Updated"); })
      .catch(()=>{ toast("Failed",true); load(); });
  }
  function run(btn, name){
    if(btn.classList.contains("busy")) return;
    const status=btn.closest(".skill").querySelector(".s-status");
    btn.classList.add("busy"); btn.textContent="Queued";
    status.innerHTML='<span class="running"></span> queued…';
    // Remember the last-run stamp so we can spot when THIS run lands and pop its output.
    const prev=(lastData && lastData.skills && lastData.skills[name]) ? lastData.skills[name].when : "";
    awaiting[name]=prev||"queued"; saveAwaiting();
    post("/api/run",{skill:name},"Queued "+name);
    setTimeout(()=>{ btn.classList.remove("busy"); btn.textContent="Run"; }, 1400);
  }

  // --- render ---------------------------------------------------------------
  function fmtDate(iso){ // YYYY-MM-DD -> "Fri 18 Jul"
    if(!iso) return ""; const d=new Date(iso+"T00:00:00");
    return d.toLocaleDateString("en-GB",{weekday:"short",day:"2-digit",month:"short"});
  }
  function duePill(t){
    if(!t.due) return "";
    const cls = t.overdue ? "over" : (t.due===localToday() ? "due" : "");
    const lbl = t.overdue ? fmtDate(t.due) : (cls==="due" ? "today" : fmtDate(t.due));
    return '<span class="pill '+cls+'">'+lbl+"</span>";
  }
  function taskRow(t, draggable){
    return '<div class="task'+(t.done?" done":"")+(t.priority?" pri":"")+'" data-id="'+t.id+'">'+
      (draggable?'<span class="drag" onpointerdown="dragStart(event)" title="Drag to reorder">⠿</span>':'')+
      '<div class="check'+(t.done?" on":"")+'" onclick="toggle(\''+t.id+'\')">'+(t.done?"✓":"")+"</div>"+
      '<div class="t-body"><span class="t-title">'+esc(t.text)+"</span>"+duePill(t)+"</div>"+
      '<button class="pstar'+(t.priority?" on":"")+'" onclick="togglePriority(\''+t.id+'\')" title="Mark priority">⏫</button>'+
      "</div>";
  }
  // Open tasks ordered priority-first, then by the vault's file order.
  function orderedOpen(tasks){
    const open=(tasks||[]).filter((t)=>!t.done);
    return open.map((t,i)=>({t,i})).sort((a,b)=>(b.t.priority?1:0)-(a.t.priority?1:0)||a.i-b.i).map((x)=>x.t);
  }
  function fmtWhen(iso){
    if(!iso) return "";
    const d=new Date(iso); if(isNaN(d)) return esc(iso);
    return d.toLocaleString("en-GB",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"});
  }
  function renderSkills(status){
    status=status||{};
    $("skills").innerHTML = SKILLS.map((s)=>{
      const st=status[s.name];
      let line='<span style="color:var(--faint)">not run yet</span>';
      let outs="";
      const hasOut = !!(st && st.outputs && st.outputs.length);
      if(st){
        const mark=st.ok===false?'<span class="cross">✗</span>':'<span class="tick">✓</span>';
        line=mark+" ran "+fmtWhen(st.when);
        // If a run produced more than one file, list the extras (Open covers the newest).
        if(hasOut && st.outputs.length>1){
          // data-path (not an inline onclick) so quotes/parens in a filename
          // can't break out of the handler — the delegated listener reads it back.
          outs='<div class="s-out">'+st.outputs.map((p)=>
            '📄 <a data-path="'+esc(p)+'">'+esc(p.split("/").pop())+"</a>").join("")+"</div>";
        }
      }
      const openBtn = hasOut
        ? '<button class="open-btn" data-path="'+esc(st.outputs[0])+'">Open</button>'
        : '<button class="open-btn disabled" title="No saved output yet" disabled>Open</button>';
      const runBtn = s.noRun ? "" : '<button class="run-btn" data-skill="'+esc(s.name)+'">Run</button>';
      return '<div class="skill"><div class="s-body"><div class="s-name">'+esc(s.label||s.name)+"</div>"+
        '<div class="s-desc">'+esc(s.desc)+'</div>'+outs+'</div>'+
        '<div class="s-status">'+line+'</div>'+
        '<div class="s-actions">'+openBtn+runBtn+'</div></div>';
    }).join("");
  }
  // One delegated listener instead of per-row inline handlers.
  $("skills").addEventListener("click",(e)=>{
    const opener=e.target.closest("[data-path]");
    if(opener && !opener.disabled){ openFile(opener.dataset.path); return; }
    const runBtn=e.target.closest(".run-btn[data-skill]");
    if(runBtn) run(runBtn, runBtn.dataset.skill);
  });

  // File viewer modal ---------------------------------------------------------
  function openFile(path){
    $("modalName").textContent=path;
    $("modalBody").innerHTML='<div class="muted">Loading…</div>';
    $("replyText").value="";
    $("modalReply").classList.remove("hidden");
    $("modalBack").classList.add("show");
    req("/api/file?path="+encodeURIComponent(path))
      .then((r)=>{ if(!r.ok) throw new Error(); return r.json(); })
      .then((d)=>{ $("modalBody").innerHTML=mdToHtml(d.text); decorateAdvice(); })
      .catch(()=> $("modalBody").innerHTML='<div class="muted">Couldn\'t load this file.</div>');
  }
  function closeModal(){ $("modalBack").classList.remove("show"); }
  // The sheet does double duty: a file with a reply box, or a plain panel.
  function openPanel(title, html){
    $("modalName").textContent=title;
    $("modalBody").innerHTML=html;
    $("modalReply").classList.add("hidden");
    $("modalBack").classList.add("show");
  }
  // Reply to an open brief → capture + immediately run File to action it.
  function sendReply(){
    const t=$("replyText").value.trim(); if(!t) return;
    $("replyText").value="";
    req("/api/capture",{method:"POST",body:JSON.stringify({text:t})})
      .then((r)=>{ if(!r.ok) throw new Error(); return queueSkill("file-inbox","","Sent — filing now"); })
      .catch(()=>toast("Failed",true));
    closeModal();
  }
  // Add a "Save" to each item under an ## Advice heading → append to Charlotte.
  function decorateAdvice(){
    const body=$("modalBody");
    const h=[...body.querySelectorAll("h3")].find((x)=>/advice/i.test(x.textContent));
    const ul=h && h.nextElementSibling;
    if(!ul || ul.tagName!=="UL") return;
    [...ul.querySelectorAll("li")].forEach((li)=>{
      const text=li.textContent.trim();
      const btn=document.createElement("button");
      btn.className="save-advice"; btn.textContent="＋ Save";
      btn.onclick=()=>saveAdvice(text, btn);
      li.appendChild(document.createTextNode(" ")); li.appendChild(btn);
    });
  }
  function saveAdvice(text, btn){
    btn.disabled=true; btn.textContent="Saving…";
    req("/api/append",{method:"POST",body:JSON.stringify({person:"Charlotte",text})})
      .then((r)=>{ if(!r.ok) throw new Error(); btn.textContent="Saved ✓"; toast("Saved to Charlotte"); })
      .catch(()=>{ btn.disabled=false; btn.textContent="＋ Save"; toast("Failed",true); });
  }
  document.addEventListener("keydown",(e)=>{ if(e.key==="Escape") closeModal(); });
  let showAll=false;
  function toggleShowAll(){ showAll=!showAll; if(lastData) renderTasks(lastData.tasks); }
  function renderTasks(tasks){
    const openFO=(tasks||[]).filter((t)=>!t.done);     // file order (drag-controlled)
    const top=orderedOpen(tasks).slice(0,3);           // priority-first for the top
    $("taskCount").textContent = openFO.length+" open";
    $("tasksTop").innerHTML = top.length ? top.map((t)=>taskRow(t,false)).join("")
      : '<div class="muted">No open tasks.</div>';
    const all=$("tasksAll");
    if(!showAll){ all.classList.add("hidden");
      $("showAllBtn").textContent = openFO.length>3 ? "Show all ("+openFO.length+")" : "Show all";
      $("showAllBtn").style.display = openFO.length ? "" : "none"; return; }
    all.classList.remove("hidden"); $("showAllBtn").textContent="Show less";
    const byArea={}; const other=[];
    openFO.forEach((t)=>{ const a=(t.tags||[]).find((g)=>AREAS.includes(g));
      if(a){ (byArea[a]=byArea[a]||[]).push(t); } else other.push(t); });
    let html="";
    AREAS.forEach((a)=>{ if(!byArea[a]) return;
      html+='<div class="tcat '+a+'">'+a+' <span style="color:var(--faint)">'+byArea[a].length+'</span></div>'+
        '<div class="tgroup" data-area="'+a+'">'+byArea[a].map((t)=>taskRow(t,true)).join("")+'</div>'; });
    if(other.length) html+='<div class="tcat">other</div><div class="tgroup" data-area="">'+other.map((t)=>taskRow(t,true)).join("")+'</div>';
    all.innerHTML = html;
  }
  // --- priority + drag-reorder ---------------------------------------------
  function togglePriority(id){
    if(lastData){ const t=(lastData.tasks||[]).find((x)=>String(x.id)===String(id)); if(t){ t.priority=!t.priority; renderTasks(lastData.tasks); } }
    req("/api/priority",{method:"POST",body:JSON.stringify({id})})
      .then((r)=>{ if(!r.ok) throw new Error(); }).catch(()=>{ toast("Failed",true); load(); });
  }
  let dragEl=null, dragGroup=null;
  function dragStart(e){
    const row=e.target.closest(".task"); if(!row) return;
    e.preventDefault();
    dragEl=row; dragGroup=row.parentElement; row.classList.add("dragging");
    document.addEventListener("pointermove", dragMove);
    document.addEventListener("pointerup", dragEnd, {once:true});
  }
  function dragMove(e){
    if(!dragEl) return;
    const el=document.elementFromPoint(e.clientX,e.clientY);
    const over=el&&el.closest(".task");
    if(over&&over!==dragEl&&over.parentElement===dragGroup){
      const r=over.getBoundingClientRect();
      dragGroup.insertBefore(dragEl, (e.clientY-r.top)<r.height/2 ? over : over.nextSibling);
    }
  }
  function dragEnd(){
    document.removeEventListener("pointermove", dragMove);
    if(!dragEl) return;
    dragEl.classList.remove("dragging"); dragEl=null;
    const ids=[...$("tasksAll").querySelectorAll(".task")].map((r)=>r.dataset.id);
    req("/api/reorder",{method:"POST",body:JSON.stringify({ids})})
      .then((r)=>{ if(!r.ok) throw new Error(); toast("Reordered"); }).catch(()=>{ toast("Reorder failed",true); load(); });
  }
  function renderBrief(b){
    $("briefName").textContent = b ? b.name.replace(/\.md$/,"") : "—";
    $("brief").innerHTML = b ? mdToHtml(b.text) : '<div class="muted">—</div>';
  }
  function renderPeople(people){
    $("pplCount").textContent = people.length;
    $("ppl").innerHTML = people.length ? people.slice(0,6).map((p)=>
      '<div class="ent"><div class="av">'+esc((p.name||"?")[0].toUpperCase())+"</div>"+
      '<div><div class="e-name">'+esc(p.name)+"</div>"+
      '<div class="e-sum">'+esc(mdPlain(p.summary))+"</div></div></div>"
    ).join("") : '<div class="muted">—</div>';
  }
  // Agenda = occasions + due tasks in the next 7 days, merged and dated.
  function renderAgenda(d){
    const today=localToday();
    const wk=new Intl.DateTimeFormat("en-CA",{timeZone:"Europe/London"}).format(new Date(Date.now()+7*864e5));
    const items=[];
    (d.occasions||[]).forEach((o)=>{ if(o.date>=today && o.date<=wk) items.push({date:o.date,text:o.text,kind:"occasion"}); });
    (d.tasks||[]).forEach((t)=>{ if(!t.done && t.due && t.due>=today && t.due<=wk) items.push({date:t.due,text:t.text,kind:"task"}); });
    items.sort((a,b)=>a.date.localeCompare(b.date));
    $("agenda").innerHTML = items.length ? items.map((it)=>{
      const days=Math.round((new Date(it.date)-new Date(today))/864e5);
      const inTxt = days<=0?"today":(days===1?"tomorrow":"in "+days+"d");
      const mark = it.kind==="task" ? '<span style="color:var(--faint)">✓ </span>' : "";
      return '<div class="occ"><span class="d">'+fmtDate(it.date).replace(/^\w+\s/,"")+'</span><span>'+mark+esc(it.text)+'</span><span class="in">'+inTxt+'</span></div>';
    }).join("") : '<div class="muted">Nothing in the next 7 days.</div>';
  }
  // Habits: today's tick-offs with per-habit streaks (data from habits.md).
  function renderHabits(habits){
    habits=habits||[];
    const el=$("habits");
    if(!habits.length){ el.classList.remove("skel"); el.innerHTML='<div class="muted">Add habits to habits.md in the vault.</div>'; $("habitPct").textContent=""; return; }
    const all=habits.reduce((n,h)=>n+h.items.length,0);
    const done=habits.reduce((n,h)=>n+h.items.filter(i=>i.done).length,0);
    $("habitPct").textContent = all ? Math.round(100*done/all)+"% today" : "";
    el.innerHTML = habits.map((h)=>{
      const d=h.items.filter(i=>i.done).length;
      return '<div class="habit'+(d===h.items.length?" complete":"")+'">'+
        '<div class="habit-head"><span class="habit-name">'+esc(h.name)+'</span>'+
        (h.streak>1?'<span class="habit-streak">🔥 '+h.streak+'</span>':'')+
        '<span class="habit-count">'+d+"/"+h.items.length+'</span></div>'+
        '<div class="habit-items">'+h.items.map((i)=>
          '<div class="habit-item'+(i.done?" on":"")+'" data-habit="'+esc(h.name)+'" data-item="'+esc(i.text)+'">'+
          '<span class="hchk">✓</span><span>'+esc(i.text)+'</span></div>').join("")+'</div></div>';
    }).join("");
  }
  $("habits").addEventListener("click",(e)=>{
    const row=e.target.closest(".habit-item"); if(!row) return;
    const habit=row.dataset.habit, item=row.dataset.item;
    // Optimistic flip, then persist.
    if(lastData && lastData.habits){
      const h=lastData.habits.find((x)=>x.name===habit);
      const i=h && h.items.find((x)=>x.text===item);
      if(i){ i.done=!i.done; renderHabits(lastData.habits); }
    }
    req("/api/habit",{method:"POST",body:JSON.stringify({habit,item})})
      .then((r)=>{ if(!r.ok) throw new Error(); })
      .catch(()=>{ toast("Failed",true); load(); });
  });

  // Inbox chip: unfiled captures + one-tap File.
  function renderInbox(n){
    const el=$("inboxChip");
    if(n>0){ el.innerHTML = n+' waiting · <a class="link" style="padding:0" onclick="runFile()">File</a>'; }
    else { el.textContent = "→ inbox/"; }
  }
  function queueSkill(name, input, msg){
    awaiting[name]=(lastData&&lastData.skills&&lastData.skills[name])?lastData.skills[name].when:"queued"; saveAwaiting();
    return req("/api/run",{method:"POST",body:JSON.stringify({skill:name,input:input||""})})
      .then((r)=>{ if(!r.ok) throw new Error(); toast(msg); })
      .catch(()=>toast("Failed",true));
  }
  function runFile(){ queueSkill("file-inbox","","Filing…"); }
  function askVault(){
    const q=$("askq").value.trim(); if(!q) return;
    $("askq").value=""; queueSkill("ask",q,"Asking…");   // its answer auto-opens when ready
  }
  function render(d){
    lastData=d;
    $("gen").textContent = "updated "+new Date(d.generated).toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"});
    $("skillsCount").textContent = Object.values(d.skills||{}).filter((s)=>s.queued).length
      ? "a run is queued" : "on-demand";
    renderSkills(d.skills); renderTasks(d.tasks);
    renderBrief(d.brief); renderPeople(d.people||[]); renderAgenda(d); renderInbox(d.inbox||0);
    renderHabits(d.habits);
    // A run you triggered just landed → pop its first output for reading.
    const skills=d.skills||{};
    Object.keys(awaiting).forEach((name)=>{
      const st=skills[name];
      if(st && st.when && st.when!==awaiting[name]){
        delete awaiting[name]; saveAwaiting();
        if(st.outputs && st.outputs.length){ toast(name+" done"); openFile(st.outputs[0]); }
        else toast(name+(st.ok===false?" failed":" ran"),st.ok===false);
      }
    });
  }

  // Vault prose is Obsidian-flavoured, so a renderer that only knows **bold**
  // leaks `_italics_`, `[[wikilinks]]` and `- [ ]` checkboxes as literal syntax
  // into the brief — which is exactly what it was doing.
  function mdInline(s){
    return esc(s)
      .replace(/\[\[([^\]|]+)\|([^\]]+)\]\]/g,"$2")          // [[note|alias]] -> alias
      .replace(/\[\[([^\]]+)\]\]/g,"$1")                     // [[note]] -> note
      .replace(/\[([^\]]+)\]\((https?:[^)\s]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>')
      .replace(/`([^`]+)`/g,"<code>$1</code>")
      .replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>")
      .replace(/(^|[\s(])_([^_]+)_(?=[\s.,;:)!?]|$)/g,"$1<em>$2</em>")
      .replace(/(^|[\s(])\*([^*]+)\*(?=[\s.,;:)!?]|$)/g,"$1<em>$2</em>")
      .replace(/📅\s*(\d{4}-\d{2}-\d{2})/g,'<span class="pill">$1</span>')
      .replace(/(^|\s)#([A-Za-z][A-Za-z0-9_-]*)/g,'$1<span class="pill">#$2</span>');
  }
  // Strip markdown to plain text — for summaries rendered into a bare element.
  function mdPlain(s){
    return (s||"").replace(/\[\[([^\]|]+)(?:\|([^\]]+))?\]\]/g,(m,a,b)=>b||a)
      .replace(/\*\*|__|[*_`]/g,"").trim();
  }
  function mdToHtml(md){
    const lines=md.replace(/\r/g,"").split("\n"); let html="", inList=false;
    const close=()=>{ if(inList){ html+="</ul>"; inList=false; } };
    for(let raw of lines){
      const l=raw.trimEnd();
      if(/^#{1,6}\s/.test(l)){ close(); html+="<h3>"+mdInline(l.replace(/^#{1,6}\s/,""))+"</h3>"; continue; }
      if(/^(---+|\*\*\*+)$/.test(l)){ close(); html+="<hr>"; continue; }
      // Checkbox lines are common in briefs; render the box, not the brackets.
      const cb=l.match(/^\s*[-*]\s+\[([ xX])\]\s+(.*)$/);
      if(cb){ if(!inList){html+="<ul>";inList=true;}
        html+='<li class="md-task'+(cb[1]===" "?"":" done")+'"><span class="md-box">'+
          (cb[1]===" "?"":"✓")+"</span>"+mdInline(cb[2])+"</li>"; continue; }
      if(/^\s*[-*]\s+/.test(l)){ if(!inList){html+="<ul>";inList=true;} html+="<li>"+mdInline(l.replace(/^\s*[-*]\s+/,""))+"</li>"; continue; }
      if(/^>\s?/.test(l)){ close(); html+="<blockquote>"+mdInline(l.replace(/^>\s?/,""))+"</blockquote>"; continue; }
      if(!l.trim()){ close(); continue; }
      close(); html+="<p>"+mdInline(l)+"</p>";
    }
    close();
    return html;
  }

  // --- web push -------------------------------------------------------------
  const pushSupported = "serviceWorker" in navigator && "PushManager" in window;
  // Register for installability whenever service workers exist — not only when Push does.
  if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(()=>{});
  function refreshAlertsBtn(){
    const show = pushSupported && TOKEN && Notification.permission !== "granted";
    $("alertsBtn").classList.toggle("hidden", !show);
  }
  async function enableAlerts(){
    try{
      const perm = await Notification.requestPermission();
      if(perm !== "granted"){ toast("Alerts blocked in browser settings", true); return; }
      const reg = await navigator.serviceWorker.ready;
      const kr = await req("/api/push-key"); const { key } = await kr.json();
      if(!key){ toast("Push not configured on the Worker yet", true); refreshAlertsBtn(); return; }
      const raw = Uint8Array.from(atob(key.replace(/-/g,"+").replace(/_/g,"/")), (c)=>c.charCodeAt(0));
      const sub = await reg.pushManager.subscribe({ userVisibleOnly:true, applicationServerKey: raw });
      const r = await req("/api/push-subscribe",{ method:"POST", body:JSON.stringify({ subscription: sub.toJSON() }) });
      if(!r.ok) throw new Error();
      toast("Alerts on"); refreshAlertsBtn();
    }catch(e){ toast("Couldn't enable alerts", true); }
  }

  // --- voice capture (browser speech-to-text; hidden where unsupported) ----
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  let rec = null, recBase = "";
  if (SR) $("micBtn").classList.remove("hidden");
  function toggleMic(){
    if(rec){ rec.stop(); return; }
    rec = new SR();
    rec.lang = "en-GB"; rec.continuous = true; rec.interimResults = true;
    recBase = $("cap").value ? $("cap").value.replace(/\s+$/,"") + " " : "";
    rec.onresult = (e)=>{
      let text = "";
      for (const r of e.results) text += r[0].transcript;
      $("cap").value = recBase + text.trim();
    };
    rec.onend = ()=>{ rec = null; $("micBtn").classList.remove("rec"); $("micBtn").textContent = "🎙 Rec"; };
    rec.onerror = (e)=>{ if(e.error!=="aborted") toast("Mic: "+e.error, true); };
    rec.start();
    $("micBtn").classList.add("rec"); $("micBtn").textContent = "■ Stop";
  }

  // --- weather (Open-Meteo, no key needed) ---------------------------------
  const WX={ lat:52.2053, lon:0.1218, place:"Cambridge" };   // fallback
  let wxData=null;
  function wmo(c){
    if(c===0) return ["☀️","Clear"];
    if(c<=2) return ["🌤️","Partly cloudy"];
    if(c===3) return ["☁️","Overcast"];
    if(c<=48) return ["🌫️","Fog"];
    if(c<=57) return ["🌦️","Drizzle"];
    if(c<=67) return ["🌧️","Rain"];
    if(c<=77) return ["🌨️","Snow"];
    if(c<=82) return ["🌧️","Showers"];
    if(c<=86) return ["🌨️","Snow showers"];
    return ["⛈️","Thunderstorm"];
  }
  // European AQI bands → label + colour.
  function aqiBand(v){
    if(v==null) return ["—","var(--muted)"];
    if(v<=20) return ["good","var(--green)"];
    if(v<=40) return ["fair","var(--green)"];
    if(v<=60) return ["moderate","var(--yellow)"];
    if(v<=80) return ["poor","var(--red)"];
    return ["very poor","var(--red)"];
  }
  // Live location: cached → geolocation (once) → Cambridge fallback (null).
  async function getCoords(){
    const c=localStorage.getItem("lv_geo");
    if(c){ try{ return JSON.parse(c); }catch{} }
    if(navigator.geolocation){
      try{
        const p=await new Promise((res,rej)=>navigator.geolocation.getCurrentPosition(res,rej,{timeout:6000,maximumAge:36e5}));
        const o={lat:+p.coords.latitude.toFixed(3), lon:+p.coords.longitude.toFixed(3)};
        localStorage.setItem("lv_geo",JSON.stringify(o)); return o;
      }catch(e){}
    }
    return null;
  }
  async function placeName(lat,lon){
    try{ const r=await fetch("https://api.bigdatacloud.net/data/reverse-geocode-client?latitude="+lat+"&longitude="+lon+"&localityLanguage=en");
      const j=await r.json(); return j.city||j.locality||j.principalSubdivision||"Local"; }catch{ return "Local"; }
  }
  async function loadWeather(){
    try{
      const c=await getCoords();
      if(c){ WX.lat=c.lat; WX.lon=c.lon; WX.place=null; }
      const base="latitude="+WX.lat+"&longitude="+WX.lon+"&timezone=Europe%2FLondon";
      const wxU="https://api.open-meteo.com/v1/forecast?"+base+"&current=temperature_2m,weather_code&hourly=temperature_2m,precipitation_probability&daily=temperature_2m_max,temperature_2m_min&forecast_days=1";
      const aqU="https://air-quality-api.open-meteo.com/v1/air-quality?"+base+"&current=european_aqi,pm2_5";
      const [wr,ar]=await Promise.all([fetch(wxU), fetch(aqU).catch(()=>null)]);
      if(!wr.ok) throw new Error();
      const wj=await wr.json(); const aj=(ar&&ar.ok)?await ar.json():null;
      renderWeather(wj, aj);
      if(WX.place){ $("wxPlace").textContent=WX.place; }
      else placeName(WX.lat,WX.lon).then((n)=>{ if($("wxPlace")) $("wxPlace").textContent=n; });
    }catch(e){ $("weatherBody").innerHTML='<div class="muted">Weather unavailable.</div>'; }
  }
  function renderWeather(d, aq){
    const cur=d.current, day=d.daily, h=d.hourly;
    const [em,txt]=wmo(cur.weather_code);
    const hi=Math.round(day.temperature_2m_max[0]), lo=Math.round(day.temperature_2m_min[0]);
    const temps=h.temperature_2m.slice(0,24), precs=(h.precipitation_probability||[]).slice(0,24), times=h.time.slice(0,24);
    const W=240,H=100,padT=14,padB=16,left=3,right=W-3;
    const mn=Math.min(...temps), mx=Math.max(...temps), span=(mx-mn)||1;
    const xs=(i)=> left+i*((right-left)/23);
    const ys=(t)=> padT+(1-(t-mn)/span)*(H-padT-padB);
    wxData={ temps, precs, times, W, left, right };   // for the hover tooltip
    let line="", area="M "+xs(0).toFixed(1)+" "+ys(temps[0]).toFixed(1);
    temps.forEach((t,i)=>{ const x=xs(i).toFixed(1),y=ys(t).toFixed(1); line+=(i?" L ":"M ")+x+" "+y; if(i) area+=" L "+x+" "+y; });
    area+=" L "+xs(23).toFixed(1)+" "+(H-padB)+" L "+xs(0).toFixed(1)+" "+(H-padB)+" Z";
    let bars="";
    precs.forEach((p,i)=>{ if(!p) return; const x=xs(i), bh=(p/100)*(H-padT-padB);
      bars+='<rect x="'+(x-3).toFixed(1)+'" y="'+(H-padB-bh).toFixed(1)+'" width="6" height="'+bh.toFixed(1)+'" rx="1" fill="var(--blue)" opacity="0.25"/>'; });
    let labels="";
    [0,6,12,18].forEach((i)=>{ labels+='<text class="wx-axis" x="'+xs(i).toFixed(1)+'" y="'+(H-4)+'" text-anchor="middle">'+times[i].slice(11,13)+'h</text>'; });
    const nh=Math.max(0,Math.min(23,new Date().getHours()));
    const marker='<line x1="'+xs(nh).toFixed(1)+'" y1="'+padT+'" x2="'+xs(nh).toFixed(1)+'" y2="'+(H-padB)+'" stroke="var(--line-key)" stroke-dasharray="2 2"/>'+
      '<circle cx="'+xs(nh).toFixed(1)+'" cy="'+ys(temps[nh]).toFixed(1)+'" r="3" fill="var(--accent)"/>';
    const aqi=(aq&&aq.current)?aq.current.european_aqi:null, pm=(aq&&aq.current)?aq.current.pm2_5:null;
    const [band,col]=aqiBand(aqi);
    const aqHtml = aqi!=null ? '<div class="wx-aq">Air <b style="color:'+col+'">'+band+'</b> · AQI '+Math.round(aqi)+(pm!=null?' · PM2.5 '+Math.round(pm):'')+'</div>' : '';
    $("weatherBody").innerHTML =
      '<div class="wx-top"><div class="wx-now"><span class="wx-emoji">'+em+'</span>'+
      '<div><span class="wx-temp">'+Math.round(cur.temperature_2m)+'°</span><div class="wx-cond">'+txt+'</div></div></div>'+
      '<div class="wx-hl"><b>'+hi+'°</b> / '+lo+'°<div>high / low</div></div></div>'+ aqHtml +
      '<div class="wx-chart"><svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg">'+
      bars+'<path d="'+area+'" fill="var(--accent)" opacity="0.10"/>'+
      '<path d="'+line+'" fill="none" stroke="var(--accent)" stroke-width="1.6" stroke-linejoin="round" stroke-linecap="round"/>'+
      marker+labels+'</svg><div class="wx-tip" id="wxTip"></div></div>';
    const chart=$("weatherBody").querySelector(".wx-chart");
    chart.addEventListener("pointermove", wxHover);
    chart.addEventListener("pointerleave", ()=>{ const t=$("wxTip"); if(t) t.style.opacity=0; });
  }
  // Hover/drag on the chart → tooltip for the nearest hour.
  function wxHover(e){
    if(!wxData) return;
    const chart=e.currentTarget, r=chart.getBoundingClientRect();
    const px=e.clientX-r.left;
    const vbX=(px/r.width)*wxData.W;
    let i=Math.round((vbX-wxData.left)/((wxData.right-wxData.left)/23));
    i=Math.max(0,Math.min(23,i));
    const tip=$("wxTip"); if(!tip) return;
    tip.innerHTML=wxData.times[i].slice(11,16)+" · <b>"+Math.round(wxData.temps[i])+"°</b> · "+(wxData.precs[i]||0)+"% rain";
    tip.style.opacity=1;
    const w=tip.offsetWidth||70;
    tip.style.left=Math.max(0,Math.min(r.width-w, px-w/2))+"px";
  }

  // --- boot -----------------------------------------------------------------
  if(DEV || (API && TOKEN)){
    $("gate").classList.add("hidden"); $("app").classList.remove("hidden");
    load(); setInterval(load, 60000); loadWeather(); setInterval(loadWeather, 1800000); refreshAlertsBtn(); }
  else { showGate(); }
</script>
</body>
</html>
